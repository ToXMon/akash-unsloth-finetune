---
version: "2.0"

services:
  finetune:
    # GHCR image — pinned version tag (never use :latest)
    image: ghcr.io/toxmon/akash-unsloth-finetune:v1.2.0
    command: ["/app/entrypoint.sh"]
    env:
      # === Secrets (export HF_TOKEN and HF_REPO_ID before deploying) ===
      - "HF_TOKEN=${HF_TOKEN:-}"
      - "HF_REPO_ID=${HF_REPO_ID:-ToXMon/qwen3.5-4b-finetuned}"
      # === Model Configuration ===
      - "BASE_MODEL=unsloth/qwen3.5-4b-instruct-bnb-4bit"
      - "MAX_SEQ_LENGTH=2048"
      # === Dataset Configuration ===
      - "DATA_SOURCE=lmms-lab/OlympiadBench"
      - "DATASET_NAME=lmms-lab/OlympiadBench"
      - "DATASET_SUBSET_SIZE=5000"
      - "SUBSET_SIZE=5000"
      - "DATASET_DOMAIN=medical_qa"
      - "DATA_SPLIT=test_en"
      # === LoRA Configuration ===
      - "LORA_RANK=16"
      - "LORA_ALPHA=32"
      - "LORA_DROPOUT=0.05"
      # === Training Configuration ===
      - "LEARNING_RATE=2e-4"
      - "NUM_EPOCHS=3"
      - "BATCH_SIZE=4"
      - "GRADIENT_ACCUMULATION_STEPS=4"
      - "WARMUP_STEPS=50"
      - "SEED=42"
      - "MAX_STEPS="
      # === Upload Configuration ===
      - "PUSH_MERGED=true"
      - "PUSH_ADAPTERS=true"
      # === Cost Control ===
      - "HOURLY_RATE=0.75"
      - "MAX_BUDGET=3.00"
      # === Paths ===
      - "CONFIG_PATH=configs/train_config.yaml"
      - "OUTPUT_PATH=/app/data/train.jsonl"
    expose:
      - port: 8080
        as: 8080
        to:
          - global: true

profiles:
  compute:
    finetune:
      resources:
        cpu:
          units: 4
        memory:
          size: 24Gi
        storage:
          size: 50Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
                - model: a40
                - model: l40
                - model: l40s
                - model: rtx4090
                - model: rtx3090
                - model: rtx4080
                - model: v100
                - model: t4
  placement:
    akash:
      pricing:
        finetune:
          denom: uact
          amount: 200000
deployment:
  finetune:
    akash:
      profile: finetune
      count: 1
